# Frozen benchmark suite for process_tracing pipeline audit validation.
#
# Each case specifies an expected audit outcome. The benchmark runner
# (scripts/run_benchmark.py) loads cases, runs audit_result on each, and
# checks scores and flags against the expectations below.
#
# Failure modes captured here:
#   adversarial_fragile_overclaim — 12 background weak items, fragile winner,
#     broad winning hypothesis; audit should grade C and flag broad hypothesis.
#   adversarial_calibration_mismatch — synthesis labels strongly_supported
#     but posterior is 0.3; audit should flag calibration mismatch.
#   french_revolution_real — real E2E output; should grade B with no overclaim.
#     Optional because the result.json lives in output/ (not committed).
#
# Adding a case: provide either type: fixture (fixture name) or
# type: result_file (local paths). Set optional: true for cases that depend
# on uncommitted local artifacts.

cases:
  - name: adversarial_fragile_overclaim
    type: fixture
    fixture: adversarial_stress
    description: >
      Planted failure: 12 weak background items dominate, fragile winner,
      broad legitimacy-vacuum hypothesis. Audit must flag broad_winning_hypothesis
      and cap at grade C.
      NOTE: This fixture also incidentally triggers verdict_calibration_mismatch
      (h2 is labeled "supported" but has posterior ~0.001 due to absence evidence),
      which is an unintended second failure mode of the same fixture — not a
      separately designed test. must_flag only asserts broad_winning_hypothesis;
      verdict_calibration_mismatch is not asserted but is expected to appear in flags_found.
    focal_year: 1799
    optional: false
    expected:
      min_score: 60
      max_score: 85
      grade: "C"
      must_flag:
        - broad_winning_hypothesis
      must_not_flag: []

  - name: adversarial_calibration_mismatch
    type: fixture
    fixture: calibration_mismatch
    description: >
      Planted failure: synthesis assigns strongly_supported to a hypothesis
      with posterior 0.30, below the STRONG_SUPPORT_FLOOR of 0.50.
      Audit must flag the calibration mismatch.
    focal_year: 1799
    optional: false
    expected:
      min_score: 40
      max_score: 100
      grade: null
      must_flag:
        - verdict_calibration_mismatch
      must_not_flag: []

  - name: critic_pipeline_confound_text
    type: result_file
    result_path: output/benchmark_critic_confound/result.json
    focal_year: 1847
    optional: true
    description: >
      Critic pipeline smoke test on a synthetic text with a planted confound
      (fiscal crisis and popular unrest co-vary perfectly across all documented
      instances). The critic runs without error (grade B) and produces void_link
      and confirmed_link findings. NOTE: the critic does NOT detect the confound
      as a 'confound' finding — the same-model limitation (C-017) prevents
      detection of confounds that are also shared assumptions of the underlying
      Pass 3 model. This case validates the critic pipeline runs correctly,
      not that it catches all structural issues.
    expected:
      min_score: 70
      max_score: 100
      grade: null
      must_flag: []
      must_not_flag:
        - overclaim

  - name: french_revolution_real
    type: result_file
    result_path: output/slice7_v2/result.json
    report_path: output/slice7_v2/report.html
    focal_year: 1789
    optional: true
    description: >
      Real E2E output on French Revolution text (Wikipedia). Critic ablation
      pass (22 findings). Should grade B with no overclaim flagged.
    expected:
      min_score: 70
      max_score: 100
      grade: "B"
      must_flag: []
      must_not_flag:
        - overclaim
