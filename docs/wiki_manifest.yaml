version: 1
project: process_tracing
publish:
  - path: README.md
    type: ProjectOverview
    title: Process Tracing Overview
    tags: [portfolio, analysis, process-tracing]
  - path: docs/REVIEWER_WALKTHROUGH.md
    type: PortfolioGuide
    title: Process Tracing Reviewer Walkthrough
    tags: [portfolio, process-tracing, analyst-methods]
  - path: docs/portfolio/FRENCH_DIRECTORY_COLLAPSE_CASE_BUNDLE.md
    type: PortfolioEvidence
    title: French Directory Collapse Case Bundle
    tags: [portfolio, process-tracing, analyst-methods, evidence]
  - path: docs/WHITEPAPER_optimal_automated_process_tracing.md
    type: Whitepaper
    tags: [analysis, process-tracing, methodology]
  - path: docs/ontology.md
    type: ProjectDoc
    tags: [analysis, ontology, process-tracing]
  - glob: evidence/*.md
    type: EvidenceArtifact
    tags: [evidence, verification, process-tracing]
exclude:
  - docs/CLAUDE.md
  - hooks/**
  - .pytest_cache/**
  - archive/**
