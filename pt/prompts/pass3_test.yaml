name: pass3_test
version: "2.0"
description: "Pass 3: coherent likelihood-vector elicitation across all hypotheses (Van Evera)"
messages:
  - role: user
    content: |
      You are performing DIAGNOSTIC TESTING for Van Evera process tracing. You will
      assess EVERY evidence item against ALL competing hypotheses at once, producing a
      coherent *likelihood vector* per evidence item.

      ## Research question (the outcome you are explaining)

      {{ research_question }}

      ## Step 0 — anchor the focal period (do this FIRST, before scoring anything)

      Identify the OUTCOME the research question asks about and its approximate date/period
      (e.g. "the Directory's collapse, 1799"). This focal period is the anchor for all
      temporal-relevance scoring below. Evidence is only as relevant as it is causally
      proximate to THIS outcome — not to the broader topic. An item that predates the focal
      institution/mechanism's very existence cannot directly explain why that institution
      later failed; treat it as background at most (see Relevance scoring).

      ## What you produce

      For each evidence item, output `hypothesis_likelihoods`: one entry per hypothesis with
      - `hypothesis_id`
      - `relative_likelihood`: how strongly THIS hypothesis predicts THIS evidence, on a
        COMMON POSITIVE SCALE shared by all hypotheses for this item. Only the RATIOS between
        hypotheses matter (e.g. 1.0 vs 4.0 means the second predicts the evidence 4× as
        strongly). Equal values across hypotheses = the evidence does not discriminate.
      - `diagnostic_type`: the Van Evera character of this evidence for this hypothesis —
        `hoop`, `smoking_gun`, `doubly_decisive`, or `straw_in_the_wind`.

      Plus, per evidence item:
      - `relevance` (0.0–1.0): how discriminating this evidence is (temporal proximity +
        causal-domain fit + specificity). Below 0.4 it will be treated as uninformative.
      - `justification`: 1–2 sentences covering BOTH why the causal story implies these
        likelihoods AND how the evidence was produced (was it solicited/formulaic/more
        recordable for one hypothesis than another?).

      ## Coherence (critical)

      Assess the WHOLE vector for an item together. Do NOT reason pairwise and then
      backfill — set the relative likelihoods so the ratios are mutually consistent. There
      is exactly one number per (evidence item, hypothesis).

      ## Van Evera's four tests (shape of the likelihoods)
      | Test | If hypothesis true | If false |
      |------|--------------------|----------|
      | Hoop | evidence very likely | — (absence would hurt) |
      | Smoking gun | — | evidence very unlikely (presence strongly confirms) |
      | Doubly decisive | very likely | very unlikely |
      | Straw in the wind | mildly likely | mildly unlikely |

      ## MANDATORY RULES FOR HONEST LIKELIHOODS

      Rule A — NO FLAT DUMPING: Among items you rate `relevance >= 0.6`, do not give equal
      likelihoods to all hypotheses for more than 5 items. For relevant evidence, think
      harder about which hypotheses predict it more strongly.

      Rule B — REPORT WEAKNESSES HONESTLY: No hypothesis is favored by *all* evidence.
      Wherever a rival genuinely predicts an item more strongly than the otherwise-leading
      hypothesis, give that rival the higher likelihood — do NOT shade every item toward one
      hypothesis. (Do not invent counter-evidence to hit a quota; if the evidence really is
      one-sided, report it as one-sided.)

      Rule C — VARIED MAGNITUDES: Use a range of ratios (1.5×, 3×, 8×…), not just one or two
      round multipliers.

      Rule D — TRACE PRODUCTION: If evidence is over-represented because of HOW it was
      recorded (administratively solicited, formulaic, more survivable) rather than because a
      cause operated, COMPRESS the ratio — do not let documentary frequency masquerade as
      causal strength. Note it in the justification.

      Rule E — NO CIRCULAR EVIDENCE: If evidence merely RESTATES or closely paraphrases a
      hypothesis (a historian asserting "X caused Y"), give all hypotheses EQUAL likelihoods
      for that item and set `relevance` to 0.1. A claim is not independent evidence for itself.

      Rule F — INTERPRETIVE CAP: For `evidence_type: "interpretive"` items (scholarly
      arguments, assessments, predictions), keep the max:min likelihood ratio across
      hypotheses at or below 5. Only direct empirical evidence (actions, decisions, measurable
      outcomes) may exceed it.

      Rule G — SPEAKER NEUTRALITY (debate/multi-speaker texts): assess the factual content,
      not who said it; do not systematically favor one speaker. Points where opposing speakers
      AGREE are stronger.

      ## Dependence clustering (prevents double-counting)

      Also output `dependence_clusters`: groups of evidence items that are NOT
      conditionally independent — they share a source/document, the same originating
      event, the same mechanism, or the same sub-narrative, so they carry OVERLAPPING
      information. Cluster broadly: many historical "items" are really facets of one
      storyline and should not each count as independent confirmation. Each cluster
      needs >= 2 distinct evidence ids, a brief `reason`, a `lineage_type`, and a `dependence_strength`
      in [0,1]:
      - **1.0** — duplicates / same-source copies / restatements of one fact.
      - **0.6–0.8** — same event or mechanism, partly independent details.
      - **0.3–0.5** — same broad sub-narrative but meaningfully different observations.

      Set `lineage_type` to the best-fit category explaining WHY the items are dependent:
      `"duplicate"` (verbatim copy), `"shared_source"` (same document/section),
      `"same_event"` (same historical event), `"same_mechanism"` (same causal process),
      or `"other"`.

      An item appears in at most one cluster; genuinely independent observations stay
      unclustered. A cluster contributes an *effective* count
      `k_eff = 1 + (k-1)(1-dependence_strength)` observations — so strongly-redundant
      groups count as ~1, loosely-related groups count as several. This is the main
      guard against overconfidence from piling up correlated evidence; prefer to
      cluster when in doubt.

      ## Relevance scoring (anchor temporal distance to the FOCAL PERIOD from Step 0)
      Measure temporal distance from the outcome's date, NOT from the broad topic:
      - same period as the outcome (within ~a year or two): 0.8–1.0
      - a few years before the outcome: 0.5–0.7
      - many years / decades before the outcome: 0.2–0.4 (background context, near or below the
        informativeness gate)
      - PREDATES the focal institution/mechanism's existence: cap at 0.4. Such an item is a
        long-run precondition of the broader topic, not evidence about why the focal outcome
        occurred — unless it directly bears on the proximate mechanism, in which case say so in
        the justification and keep it modest.
      - different causal domain than a hypothesis: reduce by 0.2–0.4
      - circular (restates a hypothesis): 0.1
      Use the LOWER of temporal and causal-domain fit. Do NOT let a vivid but temporally distant
      event drive the verdict for a narrowly-dated outcome.

      ## Diagnostic type must match the likelihood magnitude (no straw-in-the-wind monoculture)
      `diagnostic_type` is not decorative — it must be consistent with the ratios you assign:
      - `straw_in_the_wind` — mildly tilts the vector (favored:rest ratio ≲ 2×). Most items.
      - `hoop` — the favored hypothesis predicts this near-certainly; its ABSENCE would hurt that
        hypothesis. Presence is necessary-ish, not sufficient.
      - `smoking_gun` — very unlikely UNLESS the favored hypothesis holds, so presence strongly
        confirms it (ratio ≥ ~5× for the favored hypothesis over rivals).
      - `doubly_decisive` — both very likely if true AND very unlikely if false (large ratio,
        rare).
      A serious analysis identifies the FEW genuinely decisive items (smoking_gun / hoop /
      doubly_decisive) rather than labelling everything `straw_in_the_wind`. If you find yourself
      marking nearly every cell as straw, you have not finished discriminating — re-examine which
      items a hypothesis truly stakes its case on. Conversely, do NOT inflate a label beyond its
      ratio: a 1.5× tilt is a straw, not a smoking gun.

      {% if critic_context %}
      ## Structural critic findings (address these in your vector elicitation)

      A prior elicitation of this likelihood matrix was reviewed by a structural critic.
      The following issues were flagged. Take them into account when assigning relative
      likelihoods — do not simply reproduce the prior scores. Specifically:
      - For **confound** findings: control for the named third variable when scoring the
        affected evidence item. Do not give the hypothesis extra credit for evidence that
        the confound also predicts.
      - For **void_link** findings: if an edge has no evidentiary support, discount
        evidence that relies on that mechanism operating.
      - For **too_strong_claim** findings: downgrade the diagnostic label to match the
        actual strength of the justification; do not re-inflate it.

      {{ critic_context }}

      {% endif %}
      ## Hypotheses (assign a likelihood for EACH, for EVERY evidence item)

      {{ hypotheses_json }}

      Hypothesis ids (every evidence item's vector must cover all of these):
      {{ hypothesis_ids }}

      ## ALL evidence items (produce a vector for EVERY one)

      {{ evidence_json }}

      ## Discrimination check

      Before finishing: for each pair of hypotheses that seem similar, check whether the
      evidence actually distinguishes them. Where items genuinely discriminate, make sure
      their likelihoods diverge accordingly; where the evidence truly cannot tell two
      hypotheses apart, leave those items non-discriminating rather than forcing a split.
      Do not manufacture divergence to hit a count.
