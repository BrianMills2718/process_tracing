pending:
  - id: P1
    priority: high
    effort: large
    summary: "Slice 7 — Structural Critic Ablation"
    details: >
      New critic pass that reads causal extraction + likelihood vectors and flags:
      confounds, missing pathways, void links, too-strong likelihood claims, confirmed links.

      CONSTRAINTS (hard — do not violate):
      (1) No direct LR mutation — any numeric change must route through re-elicitation of Pass 3.
      (2) On/off CLI flag: --critic (off by default).
      (3) Ablation artifacts: result_base.json + result_critic.json + critic_delta.json written
          to the output directory when --critic is active.
      (4) Critic output is ADVISORY — it flags issues for re-elicitation, does not patch LRs.

      SCHEMA CHANGES needed:
      - New Pydantic model CriticFinding (in pt/schemas.py) with fields: finding_type (Literal[
        "confound", "missing_pathway", "void_link", "too_strong_claim", "confirmed_link"]),
        target (str -- evidence_id, hypothesis_id, or causal edge "src->tgt"), severity
        (Literal["high", "medium", "low"]), reasoning (str), recommendation (str).
      - New CriticResult model: findings (list[CriticFinding]), summary (str), re_elicitation_needed (bool).
      - ProcessTracingResult gets an optional critic field: Optional[CriticResult] = None.

      NEW FILES:
      - pt/pass_critic.py — LLM call reading extraction + testing results, returns CriticResult.
      - pt/prompts/pass_critic.yaml — prompt for the critic pass.

      PIPELINE CHANGES:
      - pt/pipeline.py: if --critic flag, run pass_critic after pass_diagnostic (Pass 3.6),
        before Bayesian update. If critic.re_elicitation_needed, re-run pass_test and
        pass_diagnostic with the critic summary injected into the pass3 prompt context.
        Save result_base.json before critic re-elicitation; save result_critic.json after.
        Compute critic_delta.json = diff of posteriors and top drivers between base and critic.
      - pt/cli.py: add --critic flag (bool, default False).

      REPORT CHANGES:
      - pt/report.py: if result.critic, add a collapsed "Structural Critic" section listing
        findings by severity. Link each finding to the evidence/hypothesis it references.

      AUDIT CHANGES:
      - scripts/audit_result_quality.py: if result.critic and re_elicitation_needed and
        critic field is None (i.e., critic was available but not run), add a note.
        No new cap needed for Slice 7 — the critic is advisory.

      E2E:
      - Run Brumaire (input_text/18_brumaire/) with --critic OFF, save to output/slice7_base/
      - Run Brumaire with --critic ON, save to output/slice7_critic/
      - Verify critic_delta.json exists and shows non-trivial posterior changes when critic fires
      - Run make audit-result on both outputs and compare grades

      SUCCESS CRITERIA:
      - Critic catches at least one confound or missing pathway in the Brumaire run
      - re_elicitation_needed=True triggers a second pass3 call (observable in logs/trace_id)
      - result_base.json posteriors differ from result_critic.json posteriors (delta > 0)
      - No LR is directly patched — all numeric changes come from re-elicitation
      - 135+ deterministic tests still pass (no regressions)
      - Audit grade does not drop below B on either Brumaire result

